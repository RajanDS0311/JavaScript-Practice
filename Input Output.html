<!DOCTYPE html>
<html>
    <head>
        <title>Input Output</title>
    </head>
    <body>
        <script>
        var num1 = prompt("Enter first number");
        var num2 = prompt("Enter second number");
        var sum = parseInt(num1) + parseInt(num2);
        alert("The sum of " + num1 + " and " + num2 + " is: " + sum);
        </script>
    </body>
</html>
