<!DOCTYPE html>
<html>
    <head>
        <title>Star Left Descending triangle</title>
    </head>
<body>
    <script>
        var n = parseInt(prompt("Enter the number of rows:"));

        for (var i= n; i>= 1;i--){

            for(var j = 1; j<=i;j++){
                document.write("* ");
            }
            document.write("<br>");
        }
    </script>
</body>
</html>
