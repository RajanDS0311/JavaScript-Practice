<!DOCTYPE html>
<html>
    <head>
        <title>Switch Case Example</title>
    </head>
    <body>
        <script>
            var num = parseInt(prompt("Enter your age"));
            switch(num){
                case 0 < num < 12:
                    document.writeln("You are a child");
                case 13 < num < 18:
                    document.writeln("You are a teenager");
                case num > 18:
                    document.writeln("You are an adult");
            }
            
        </script>

    </body>
</html>
