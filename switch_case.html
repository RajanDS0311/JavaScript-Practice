<!DOCTYPE html>
<html>
    <head>
        <title>Switch Case Example</title>
    </head>
    <body>
        <script>
            var num = parseInt(prompt("Select any number between 1 to 3"));
            switch(num){
                case 1:                  
                    document.writeln("You won a Bike");
                    break;
                case 2:
                    document.writeln("You won a Scooter");
                    break;
                case 3:
                    document.writeln("You won a Car");
                    break;
                default:
                    document.writeln("Invalid selection");
            }
            
        </script>

    </body>
</html>
