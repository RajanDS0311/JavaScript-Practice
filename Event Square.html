<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Handling</title>
    <script>
        function square()
        {
            var a=parseInt(document.f1.num1.value);
            var c=a*a;
            document.f1.num2.value=c;

        }
    </script>
</head>
<body align = "center">
<form name="f1">  <h1>
        Event Handling
    </h1>

    <br>

    <input type = "text" placeholder="Enter Number" name="num1" >
    <br>
    <br>
    <br>
    <input type = "text" placeholder="Square is" name="num2"  onfocus="square();">
    </form>
  
</body>
</html>
