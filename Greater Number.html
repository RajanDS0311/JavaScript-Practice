<!DOCTYPE html>
<html>
    <head>
        <title>Greater of Two Numbers</title>
    </head>
    <body>
        <script>
            var num1 = parseInt(prompt("Enter first number"));
            var num2 = parseInt(prompt("Enter second number"));
            if(num1 > num2){
                confirm(num1 + " is greater than " + num2);
            } else if(num2 > num1){
                confirm(num2 + " is greater than " + num1);
            } else {
                confirm("Both numbers are equal");
            }
        </script>
    </body>
</html>
