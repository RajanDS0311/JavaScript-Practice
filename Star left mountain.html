<!DOCTYPE html>
<html>
    <head>
        <title>Star left mountain</title>
    </head>
<body>
    <script>
        var n = parseInt(prompt("Enter no. of rows: "))

        for (var i= 1;i<=n;i++){

            for (var j= n-1;j>=i;j--){
                document.write("&nbsp;&nbsp");
            }
            for (var k= 1;k<=i;k++){
                document.write("*"); 
            }
            document.write("<br>");
        }

        for (var i= 1;i<=n;i++){

            for (var j=1;j<=i;j++){
                document.write("&nbsp;&nbsp");
            }
            for (var k= n-1;k>=i;k--){
                document.write("*"); 
            }
            document.write("<br>");
        }

    </script>
</body>
</html>
