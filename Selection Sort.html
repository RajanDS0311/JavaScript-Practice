<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bubble Sort</title>
    </head>
<body>
    <script>
        var n = parseInt(prompt("enter the number of elements:"));
        var arr = [];

        for (var i = 0;i < n; i++){
            arr[i] = parseInt(prompt("enter the element:"+(i+1)));
        }
        document.write("Array: " + arr + "<br>");

        for (var k = 0; k < n;k++){

            for (var l= k+1;l<n;l++){
                
                if (arr[l] < arr[k]){
                    var temp = arr[k];
                    arr[k] = arr[l];
                    arr[l] = temp;
                }
            }
        }
        document.write("Sorted Array: " + arr + "<br>");
    </script>
</body>
</html>
