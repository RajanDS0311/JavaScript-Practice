<!DOCTYPE html>
<html>
    <head>
        <title>Fibonacci Series</title>
    </head>

<body>
    <script>
        var n = parseInt(prompt("Enter size of Series"));
        var a = 0;
        var b = 1;
        var count = 0;

        if (n == 0){
            document.write(0)
        }else if(n==1){
            document.write(1)
        }else{
            while (count < n){
                document.write(a+" ")
                c = a + b;
                a = b;
                b = c;
                count += 1;
            }
        }
    </script>
</body>
</html>
