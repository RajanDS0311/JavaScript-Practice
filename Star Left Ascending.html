<!DOCTYPE html>
<html>
    <head>
        <title>Star Left Ascending triangle</title>
    </head>
<body>
    <script>
        var n = parseInt(prompt("Enter the number of rows:"));

        for (var i= 1; i<= n;i++){

            for(var j = 1; j<=i ; j++){

                document.write("* ");
            }
            document.write("<br>");
        }
    </script>
</body>
</html>
